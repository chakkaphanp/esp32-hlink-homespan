[env:esp32-c6-devkitc-1]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = arduino

monitor_speed = 115200
upload_speed = 460800

lib_deps =
    homespan/HomeSpan@^2.1.8
    adafruit/Adafruit GFX Library@^1.11.9
    adafruit/Adafruit ST7735 and ST7789 Library@^1.10.3
    moononournation/GFX Library for Arduino@^1.4.6
    lvgl/lvgl@^8.3.11
    adafruit/Adafruit BME280 Library@^2.2.4
    adafruit/Adafruit BMP280 Library@^2.6.8
    crankyoldgit/IRremoteESP8266@^2.8.6

build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    -D LV_CONF_SKIP
    -D LV_CONF_INCLUDE_SIMPLE
    -D LV_COLOR_DEPTH=16
    -D LV_COLOR_16_SWAP=1
    -D LV_TICK_CUSTOM=1
    -D LV_TICK_CUSTOM_INCLUDE="\"Arduino.h\""
    -D LV_TICK_CUSTOM_SYS_TIME_EXPR="millis()"
    -D LV_FONT_MONTSERRAT_24=1
    -D LV_FONT_MONTSERRAT_48=1

board_build.partitions = huge_app.csv
monitor_filters = esp32_exception_decoder
build_src_filter = +<*> -<backup/>
